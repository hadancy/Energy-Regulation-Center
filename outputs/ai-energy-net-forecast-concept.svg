    <path d="M242 30h12l-6 7h-12z" opacity=".8"/>
    <path d="M262 30h12l-6 7h-12z" opacity=".6"/>
  </g>
  <rect x="507" y="21" width="132" height="25" rx="12.5" fill="#07344b" stroke="#1fbdd5" stroke-opacity=".48"/>
  <circle cx="522" cy="33.5" r="3" fill="#58f2cf" filter="url(#glow)"/>
  <text x="532" y="37" fill="#91bdc9" font-size="10">UI CONCEPT · 示意数据</text>

