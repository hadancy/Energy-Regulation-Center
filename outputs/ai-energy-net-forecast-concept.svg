    <rect x="24" y="878" width="306" height="103" rx="6" fill="#07334a" fill-opacity=".64" stroke="#34d7ef" stroke-opacity=".54"/>
    <path d="M63 953v-40m1 4c11 0 17 2 24 5v13c-7-3-13-5-24-5m6-12v14m8-13v14" fill="none" stroke="#dcf9ff" stroke-width="2.2"/>
    <text x="118" y="915" class="metric-label">总碳减排量</text>
