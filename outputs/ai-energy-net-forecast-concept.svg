    <text x="77" y="271" text-anchor="middle">00:00</text><text x="156" y="271" text-anchor="middle">03:00</text>
    <text x="235" y="271" text-anchor="middle">06:00</text><text x="314" y="271" text-anchor="middle">09:00</text>
    <text x="393" y="271" text-anchor="middle">12:00</text><text x="472" y="271" text-anchor="middle">15:00</text>
    <text x="551" y="271" text-anchor="middle">18:00</text><text x="630" y="271" text-anchor="middle">21:00</text>
  </g>

  <!-- Consumption chart -->
  <rect x="24" y="294" width="632" height="204" rx="7" fill="url(#panel)" stroke="#0ea5c7" stroke-opacity=".52"/>
  <text x="39" y="323" class="chart-title">24小时用电量预测（kWh）</text>
  <circle cx="553" cy="320" r="4" fill="#38bdf8" filter="url(#glow)"/>
  <text x="563" y="324" class="legend">预测用电量</text>
  <text x="77" y="345" class="unit">kWh</text>
  <g>
    <line x1="77" y1="361" x2="632" y2="361" class="grid"/>
    <line x1="77" y1="399" x2="632" y2="399" class="grid"/>
    <line x1="77" y1="437" x2="632" y2="437" class="grid"/>
    <line x1="77" y1="470" x2="632" y2="470" class="axis-line"/>
    <text x="63" y="365" text-anchor="end" class="axis">3</text>
    <text x="63" y="403" text-anchor="end" class="axis">2</text>
    <text x="63" y="441" text-anchor="end" class="axis">1</text>
    <text x="63" y="474" text-anchor="end" class="axis">0</text>
  </g>
  <path d="M77 391 L165 391 C178 391 182 395 185 413 C188 442 195 456 213 457 L509 457 C527 457 531 447 534 424 C537 399 544 391 563 391 L632 391 L632 470 L77 470Z" fill="url(#blueArea)"/>
  <path d="M77 391 L165 391 C178 391 182 395 185 413 C188 442 195 456 213 457 L509 457 C527 457 531 447 534 424 C537 399 544 391 563 391 L632 391" fill="none" stroke="#39bef7" stroke-width="2.5" filter="url(#glow)"/>
  <g class="axis">
    <text x="77" y="487" text-anchor="middle">00:00</text><text x="156" y="487" text-anchor="middle">03:00</text>
    <text x="235" y="487" text-anchor="middle">06:00</text><text x="314" y="487" text-anchor="middle">09:00</text>
    <text x="393" y="487" text-anchor="middle">12:00</text><text x="472" y="487" text-anchor="middle">15:00</text>
    <text x="551" y="487" text-anchor="middle">18:00</text><text x="630" y="487" text-anchor="middle">21:00</text>
  </g>

  <!-- Net energy chart -->
  <rect x="24" y="510" width="632" height="250" rx="7" fill="url(#panel)" stroke="#20d9c6" stroke-opacity=".68"/>
  <rect x="25" y="511" width="630" height="42" rx="6" fill="#0b3c4b" fill-opacity=".23"/>
