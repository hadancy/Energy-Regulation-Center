    <line x1="77" y1="586" x2="632" y2="586" class="grid"/>
    <line x1="77" y1="617" x2="632" y2="617" class="grid"/>
    <line x1="77" y1="650" x2="632" y2="650" stroke="#d4f7fb" stroke-opacity=".48" stroke-width="1.2" stroke-dasharray="5 4"/>
    <line x1="77" y1="682" x2="632" y2="682" class="grid"/>
    <text x="63" y="590" text-anchor="end" class="axis">+6</text>
    <text x="63" y="621" text-anchor="end" class="axis">+3</text>
    <text x="63" y="654" text-anchor="end" fill="#d6f5f8" font-size="10" font-weight="700">0</text>
    <text x="63" y="686" text-anchor="end" class="axis">−3</text>
  </g>
  <!-- Positive and negative fills are separated at the zero crossings -->
  <path d="M194 650 C213 638 232 631 252 617 C278 599 301 582 327 568 C348 557 374 555 394 564 C415 576 427 590 449 603 C470 616 494 632 511 650 L194 650Z" fill="url(#surplusArea)"/>
  <path d="M77 670 C111 668 141 666 165 668 C179 670 187 663 194 650 L194 650 L77 650Z M511 650 C524 659 531 669 545 674 C567 682 591 670 610 671 C620 671 627 674 632 676 L632 650Z" fill="url(#deficitArea)"/>
  <path d="M77 670 C111 668 141 666 165 668 C179 670 187 663 194 650" fill="none" stroke="#ff9d45" stroke-width="2.8" filter="url(#glow)"/>
  <path d="M194 650 C213 638 232 631 252 617 C278 599 301 582 327 568 C348 557 374 555 394 564 C415 576 427 590 449 603 C470 616 494 632 511 650" fill="none" stroke="#55f3c0" stroke-width="2.8" filter="url(#glow)"/>
  <path d="M511 650 C524 659 531 669 545 674 C567 682 591 670 610 671 C620 671 627 674 632 676" fill="none" stroke="#ff9d45" stroke-width="2.8" filter="url(#glow)"/>
  <circle cx="368" cy="557" r="4.5" fill="#c6fff2" stroke="#55f3c0" stroke-width="2" filter="url(#glow)"/>
  <line x1="368" y1="557" x2="368" y2="650" stroke="#74dccc" stroke-opacity=".38" stroke-dasharray="3 3"/>
  <g filter="url(#softGlow)"><rect x="286" y="565" width="178" height="80" rx="5" fill="#031526" fill-opacity=".96" stroke="#38d4c0" stroke-opacity=".58"/></g>
