<svg xmlns="http://www.w3.org/2000/svg" width="680" height="850" viewBox="0 0 680 850" role="img" aria-labelledby="title desc">
  <title id="title">AI能源预测固定高度紧凑方案</title>
  <desc id="desc">将发电量与用电量合并为供需对比图，并保留独立净电量预测图，模块高度与原方案接近。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#031b31"/><stop offset="1" stop-color="#010d1b"/></linearGradient>
    <linearGradient id="head" x1="0" x2="1"><stop stop-color="#0d607b" stop-opacity=".55"/><stop offset=".5" stop-color="#06334b" stop-opacity=".24"/><stop offset="1" stop-color="#03172a" stop-opacity="0"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#06243e"/><stop offset="1" stop-color="#03182c"/></linearGradient>
    <linearGradient id="genArea" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#20d9ee" stop-opacity=".25"/><stop offset="1" stop-color="#20d9ee" stop-opacity=".01"/></linearGradient>
    <linearGradient id="surplus" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#55f3c0" stop-opacity=".34"/><stop offset="1" stop-color="#55f3c0" stop-opacity=".04"/></linearGradient>
    <linearGradient id="deficit" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#ffad52" stop-opacity=".04"/><stop offset="1" stop-color="#ff8a3d" stop-opacity=".32"/></linearGradient>
    <pattern id="gridBg" width="18" height="18" patternUnits="userSpaceOnUse"><path d="M18 0H0V18" fill="none" stroke="#20cce8" stroke-opacity=".035"/></pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      text{font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif}.main{fill:#20dff3;font-size:22px;font-weight:700}.chartTitle{fill:#1bdcf0;font-size:16px;font-weight:700}.axis{fill:#88aabd;font-size:9.5px}.unit{fill:#24d5e8;font-size:9.5px}.legend{fill:#9eb9c8;font-size:10px}.grid{stroke:#45b9d2;stroke-opacity:.18;stroke-dasharray:4 4}.metricLabel{fill:#a8bfce;font-size:13px}.metricValue{fill:#effcff;font-size:24px;font-weight:700}.metricSub{fill:#7f9bad;font-size:10px}
    </style>
  </defs>
  <rect width="680" height="850" rx="7" fill="url(#bg)"/><rect width="680" height="850" rx="7" fill="url(#gridBg)"/>
  <rect x="6" y="6" width="668" height="838" rx="4" fill="none" stroke="#1ecce6" stroke-opacity=".67"/>
  <path d="M6 23V6h18M656 6h18v18M674 827v17h-18M24 844H6v-18" fill="none" stroke="#2bd9f0" stroke-width="1.5"/>

  <!-- header -->
  <path d="M20 8H659L648 61H20Z" fill="url(#head)" stroke="#20cce7" stroke-opacity=".38"/>
  <path d="M28 9h34l8 10v33H28L18 41V20Z" fill="#0c5973" fill-opacity=".72" stroke="#23d8ee" stroke-opacity=".48"/>
  <g transform="translate(35 22)" stroke="#8cf0fb" stroke-width="2" fill="none"><path d="M0 18V8M8 18V2M16 18V11M-2 21h20"/></g>
  <text x="82" y="41" class="main">AI能源预测</text>
  <g fill="#42d9f2" filter="url(#glow)"><path d="M222 28h12l-6 7h-12z"/><path d="M242 28h12l-6 7h-12z" opacity=".75"/><path d="M262 28h12l-6 7h-12z" opacity=".5"/></g>
  <rect x="506" y="19" width="135" height="27" rx="13.5" fill="#073449" stroke="#1fc7d9" stroke-opacity=".5"/>
  <circle cx="522" cy="32.5" r="3.5" fill="#58f2cf" filter="url(#glow)"/>
  <text x="533" y="36" fill="#a1becb" font-size="10">固定高度紧凑方案</text>

  <!-- combined supply-demand chart -->
  <rect x="22" y="70" width="636" height="229" rx="7" fill="url(#panel)" stroke="#12a9c8" stroke-opacity=".56"/>
  <text x="38" y="99" class="chartTitle">24小时发 / 用电量预测（kWh）</text>
  <circle cx="491" cy="95" r="4" fill="#20d9ee" filter="url(#glow)"/><text x="502" y="99" class="legend">预测发电量</text>
  <circle cx="579" cy="95" r="4" fill="#38bdf8" filter="url(#glow)"/><text x="590" y="99" class="legend">预测用电量</text>
  <text x="75" y="121" class="unit">kWh</text>
  <g>
    <line x1="75" y1="135" x2="634" y2="135" class="grid"/><line x1="75" y1="174" x2="634" y2="174" class="grid"/><line x1="75" y1="213" x2="634" y2="213" class="grid"/><line x1="75" y1="250" x2="634" y2="250" stroke="#68bfd1" stroke-opacity=".3"/>
    <text x="61" y="139" text-anchor="end" class="axis">9</text><text x="61" y="178" text-anchor="end" class="axis">6</text><text x="61" y="217" text-anchor="end" class="axis">3</text><text x="61" y="254" text-anchor="end" class="axis">0</text>
  </g>
  <path d="M75 240C111 238 143 235 175 232C213 228 247 215 278 198C308 181 331 164 350 152C369 140 390 134 407 135C424 136 430 146 437 159C447 176 474 184 504 199C534 214 558 230 582 237C601 242 618 237 634 240L634 250H75Z" fill="url(#genArea)"/>
  <path d="M75 240C111 238 143 235 175 232C213 228 247 215 278 198C308 181 331 164 350 152C369 140 390 134 407 135C424 136 430 146 437 159C447 176 474 184 504 199C534 214 558 230 582 237C601 242 618 237 634 240" fill="none" stroke="#20d9ee" stroke-width="2.5" filter="url(#glow)"/>
  <path d="M75 221H163C176 221 180 225 183 237C186 245 192 247 207 247H508C525 247 531 242 534 232C537 224 544 221 562 221H634" fill="none" stroke="#38bdf8" stroke-width="2.5" filter="url(#glow)"/>
  <g class="axis"><text x="75" y="270" text-anchor="middle">00:00</text><text x="155" y="270" text-anchor="middle">03:00</text><text x="235" y="270" text-anchor="middle">06:00</text><text x="315" y="270" text-anchor="middle">09:00</text><text x="395" y="270" text-anchor="middle">12:00</text><text x="475" y="270" text-anchor="middle">15:00</text><text x="555" y="270" text-anchor="middle">18:00</text><text x="634" y="270" text-anchor="middle">21:00</text></g>
  <rect x="38" y="278" width="604" height="13" rx="6.5" fill="#062e42"/>
  <text x="340" y="288" text-anchor="middle" fill="#7fa9b7" font-size="8.5">同一时间轴直接比较供给与用电需求，减少一张图的高度占用</text>

  <!-- net chart -->
  <rect x="22" y="309" width="636" height="247" rx="7" fill="url(#panel)" stroke="#20d9c6" stroke-opacity=".7"/>
  <rect x="23" y="310" width="634" height="38" rx="6" fill="#0b3c4b" fill-opacity=".23"/>
  <text x="38" y="336" class="chartTitle">24小时净电量预测（kWh）</text>
  <rect x="358" y="318" width="145" height="23" rx="11.5" fill="#073442" stroke="#39d8c0" stroke-opacity=".52"/>
  <text x="430.5" y="334" text-anchor="middle" fill="#a9eee0" font-size="10.5" font-weight="600">发电量 − 用电量</text>
  <circle cx="529" cy="323" r="3.7" fill="#55f3c0" filter="url(#glow)"/><text x="539" y="327" class="legend">盈余</text>
  <circle cx="579" cy="323" r="3.7" fill="#ff9d45" filter="url(#glow)"/><text x="589" y="327" class="legend">缺口</text>
  <text x="75" y="365" class="unit">kWh</text>
  <g>
    <line x1="75" y1="378" x2="634" y2="378" class="grid"/><line x1="75" y1="408" x2="634" y2="408" class="grid"/><line x1="75" y1="439" x2="634" y2="439" stroke="#e2fbff" stroke-opacity=".48" stroke-dasharray="5 4" stroke-width="1.2"/><line x1="75" y1="469" x2="634" y2="469" class="grid"/>
    <text x="61" y="382" text-anchor="end" class="axis">+6</text><text x="61" y="412" text-anchor="end" class="axis">+3</text><text x="61" y="443" text-anchor="end" fill="#d8f6f8" font-size="10" font-weight="700">0</text><text x="61" y="473" text-anchor="end" class="axis">−3</text>
  </g>
  <path d="M192 439C212 427 232 419 253 406C278 390 302 372 327 359C350 347 374 346 395 356C415 366 431 381 450 392C473 407 494 423 512 439H192Z" fill="url(#surplus)"/>
  <path d="M75 457C110 455 139 453 165 455C179 456 187 450 192 439H75ZM512 439C524 449 532 458 546 463C568 470 590 459 610 460C621 461 628 465 634 467V439Z" fill="url(#deficit)"/>
  <path d="M75 457C110 455 139 453 165 455C179 456 187 450 192 439" fill="none" stroke="#ff9d45" stroke-width="2.7" filter="url(#glow)"/>
  <path d="M192 439C212 427 232 419 253 406C278 390 302 372 327 359C350 347 374 346 395 356C415 366 431 381 450 392C473 407 494 423 512 439" fill="none" stroke="#55f3c0" stroke-width="2.7" filter="url(#glow)"/>
  <path d="M512 439C524 449 532 458 546 463C568 470 590 459 610 460C621 461 628 465 634 467" fill="none" stroke="#ff9d45" stroke-width="2.7" filter="url(#glow)"/>
  <circle cx="368" cy="348" r="4" fill="#d7fff6" stroke="#55f3c0" stroke-width="2" filter="url(#glow)"/><line x1="368" y1="348" x2="368" y2="439" stroke="#65d8c3" stroke-opacity=".34" stroke-dasharray="3 3"/>
  <rect x="279" y="365" width="176" height="70" rx="5" fill="#031526" fill-opacity=".96" stroke="#38d4c0" stroke-opacity=".62"/>
  <text x="291" y="381" fill="#8eaeba" font-size="9.5">12:00</text>
  <circle cx="292" cy="394" r="2.8" fill="#20d9ee"/><text x="301" y="398" fill="#a9c3cf" font-size="9.5">预测发电量</text><text x="442" y="398" text-anchor="end" fill="#e7fbff" font-size="9.5" font-weight="700">9.0 kWh</text>
  <circle cx="292" cy="410" r="2.8" fill="#38bdf8"/><text x="301" y="414" fill="#a9c3cf" font-size="9.5">预测用电量</text><text x="442" y="414" text-anchor="end" fill="#e7fbff" font-size="9.5" font-weight="700">0.4 kWh</text>
  <circle cx="292" cy="426" r="2.8" fill="#55f3c0"/><text x="301" y="430" fill="#a9c3cf" font-size="9.5">预测净电量</text><text x="442" y="430" text-anchor="end" fill="#effffb" font-size="11" font-weight="700">+8.6 kWh</text>
  <g class="axis"><text x="75" y="488" text-anchor="middle">00:00</text><text x="155" y="488" text-anchor="middle">03:00</text><text x="235" y="488" text-anchor="middle">06:00</text><text x="315" y="488" text-anchor="middle">09:00</text><text x="395" y="488" text-anchor="middle">12:00</text><text x="475" y="488" text-anchor="middle">15:00</text><text x="555" y="488" text-anchor="middle">18:00</text><text x="634" y="488" text-anchor="middle">21:00</text></g>
  <rect x="38" y="501" width="276" height="35" rx="4" fill="#0a3e3d" fill-opacity=".45" stroke="#35d7b7" stroke-opacity=".3"/><circle cx="54" cy="518.5" r="3.5" fill="#55f3c0"/><text x="65" y="522" fill="#a8d7ce" font-size="9.5">零线上方：电量盈余，可储能 / 上网</text>
  <rect x="324" y="501" width="318" height="35" rx="4" fill="#402a1a" fill-opacity=".43" stroke="#ff9d45" stroke-opacity=".3"/><circle cx="340" cy="518.5" r="3.5" fill="#ff9d45"/><text x="351" y="522" fill="#d7c0aa" font-size="9.5">零线下方：电量缺口，需储能 / 电网补能</text>

  <!-- compact KPI area -->
  <rect x="22" y="566" width="150" height="112" rx="6" fill="url(#panel)" stroke="#12a9c8" stroke-opacity=".55"/>
  <path d="M48 600v13m-8-8a12 12 0 1 0 16 0" fill="none" stroke="#a7eff8" stroke-width="2"/>
  <text x="78" y="603" class="metricLabel">储能余量</text><text x="78" y="636" class="metricValue">40<tspan font-size="12">%</tspan></text><text x="78" y="657" class="metricSub">PLC实时值</text>
  <rect x="182" y="566" width="294" height="112" rx="6" fill="#07334a" fill-opacity=".72" stroke="#34d7ef" stroke-opacity=".6"/>
  <path d="M220 621c-10-2-10-15-1-18c1-10 15-12 20-4c8 1 11 11 5 17l-8 9l1-11l-8 4l2-10" fill="none" stroke="#e5fbff" stroke-width="2.3" filter="url(#glow)"/>
  <text x="263" y="603" class="metricLabel">综合能效</text><text x="263" y="637" class="metricValue">0<tspan font-size="12">%</tspan></text><text x="263" y="658" class="metricSub">核心效率指标</text>
  <rect x="486" y="566" width="172" height="112" rx="6" fill="url(#panel)" stroke="#12a9c8" stroke-opacity=".55"/>
  <path d="M505 623h22v-24h-22zM509 614l4-5l4 3l7-8" fill="none" stroke="#d8f8ff" stroke-width="2"/>
  <text x="539" y="603" class="metricLabel">自发自用率</text><text x="539" y="636" class="metricValue">0<tspan font-size="12">%</tspan></text><text x="539" y="657" class="metricSub">PLC实时值</text>

  <rect x="22" y="688" width="307" height="142" rx="6" fill="#07334a" fill-opacity=".64" stroke="#34d7ef" stroke-opacity=".54"/>
  <path d="M63 785v-42m1 4c11 0 18 2 25 5v13c-7-3-14-5-25-5m7-12v14m8-13v14" fill="none" stroke="#dcf9ff" stroke-width="2.2"/>
  <text x="120" y="734" class="metricLabel">总碳减排量</text><text x="120" y="773" class="metricValue">0<tspan font-size="12"> t</tspan></text><text x="120" y="798" class="metricSub">重点低碳指标</text>
  <rect x="339" y="688" width="319" height="142" rx="6" fill="#07334a" fill-opacity=".64" stroke="#34d7ef" stroke-opacity=".54"/>
  <path d="M381 745l4-3l4 3l5-2l2 5l5 2l-2 5l2 5l-5 2l-2 5l-5-2l-4 3l-4-3l-5 2l-2-5l-5-2l2-5l-2-5l5-2l2-5z" fill="#d9fbff"/><circle cx="385" cy="755" r="5" fill="#07334a"/>
  <text x="419" y="734" class="metricLabel">设备维保</text><text x="419" y="773" class="metricValue">50.00<tspan font-size="12">%</tspan></text><text x="419" y="798" class="metricSub">距上次 90 天</text>
  <rect x="552" y="742" width="87" height="30" rx="4" fill="#4b350c" fill-opacity=".58" stroke="#ffc14c" stroke-opacity=".65"/><text x="595.5" y="762" text-anchor="middle" fill="#ffe28a" font-size="11.5" font-weight="700">↻ 已维保</text>
</svg>
