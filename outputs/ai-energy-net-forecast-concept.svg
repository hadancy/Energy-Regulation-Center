    <path d="M218 817c-9-2-10-14-1-17c1-10 15-12 20-4c8 1 11 11 5 17l-8 9l1-11l-8 4l2-10" fill="none" stroke="#e5fbff" stroke-width="2.4" filter="url(#glow)"/>
