  <circle cx="301" cy="595" r="3" fill="#20d9ee"/>
  <text x="310" y="599" fill="#a9c3cf" font-size="10">预测发电量</text>
  <text x="451" y="599" text-anchor="end" fill="#dffbff" font-size="10" font-weight="700">9.0 kWh</text>
  <circle cx="301" cy="612" r="3" fill="#38bdf8"/>
  <text x="310" y="616" fill="#a9c3cf" font-size="10">预测用电量</text>
  <text x="451" y="616" text-anchor="end" fill="#dffbff" font-size="10" font-weight="700">0.4 kWh</text>
  <circle cx="301" cy="630" r="3" fill="#55f3c0"/>
  <text x="310" y="634" fill="#a9c3cf" font-size="10">预测净电量</text>
  <text x="451" y="634" text-anchor="end" fill="#eafff9" font-size="12" font-weight="700">+8.6 kWh</text>
  <g class="axis">
    <text x="77" y="704" text-anchor="middle">00:00</text><text x="156" y="704" text-anchor="middle">03:00</text>
    <text x="235" y="704" text-anchor="middle">06:00</text><text x="314" y="704" text-anchor="middle">09:00</text>
    <text x="393" y="704" text-anchor="middle">12:00</text><text x="472" y="704" text-anchor="middle">15:00</text>
    <text x="551" y="704" text-anchor="middle">18:00</text><text x="630" y="704" text-anchor="middle">21:00</text>
  </g>
  <rect x="39" y="718" width="270" height="27" rx="4" fill="#0a3e3d" fill-opacity=".46" stroke="#35d7b7" stroke-opacity=".30"/>
  <circle cx="55" cy="731.5" r="3.5" fill="#55f3c0"/>
  <text x="65" y="735" fill="#a8d7ce" font-size="10">0 线上方：电量盈余，可用于储能 / 上网</text>
  <rect x="319" y="718" width="322" height="27" rx="4" fill="#402a1a" fill-opacity=".44" stroke="#ff9d45" stroke-opacity=".30"/>
  <circle cx="335" cy="731.5" r="3.5" fill="#ff9d45"/>
  <text x="345" y="735" fill="#d7c0aa" font-size="10">0 线下方：电量缺口，需储能 / 电网补能</text>

  <!-- KPI cards, preserved from the existing module -->
  <g>
    <rect x="24" y="772" width="147" height="96" rx="6" fill="url(#panel)" stroke="#11a8c9" stroke-opacity=".52"/>
