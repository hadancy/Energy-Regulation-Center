  <rect x="24" y="78" width="632" height="204" rx="7" fill="url(#panel)" stroke="#0ea5c7" stroke-opacity=".52"/>
  <text x="39" y="107" class="chart-title">24小时发电量预测（kWh）</text>
  <circle cx="553" cy="104" r="4" fill="#23d9ef" filter="url(#glow)"/>
  <text x="563" y="108" class="legend">预测发电量</text>
  <text x="77" y="129" class="unit">kWh</text>
  <g>
    <line x1="77" y1="145" x2="632" y2="145" class="grid"/>
    <line x1="77" y1="183" x2="632" y2="183" class="grid"/>
    <line x1="77" y1="221" x2="632" y2="221" class="grid"/>
    <line x1="77" y1="254" x2="632" y2="254" class="axis-line"/>
