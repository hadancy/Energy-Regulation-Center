<svg xmlns="http://www.w3.org/2000/svg" width="680" height="1010" viewBox="0 0 680 1010" role="img" aria-labelledby="title desc">
  <title id="title">AI能源预测模块——净电量预测概念稿</title>
  <desc id="desc">在发电量和用电量预测下方增加净电量预测图，零线上方表示盈余，零线下方表示缺口。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#031a30"/>
      <stop offset="0.55" stop-color="#021529"/>
      <stop offset="1" stop-color="#010d1b"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0c5d78" stop-opacity="0.52"/>
      <stop offset="0.38" stop-color="#063c58" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#031a30" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#06243e" stop-opacity="0.97"/>
      <stop offset="1" stop-color="#03182c" stop-opacity="0.97"/>
    </linearGradient>
    <linearGradient id="cyanArea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#19d8f2" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#19d8f2" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="blueArea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#35bdf5" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#35bdf5" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="surplusArea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#55f3c0" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#55f3c0" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="deficitArea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb14a" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ff8a3d" stop-opacity="0.34"/>
    </linearGradient>
    <pattern id="microGrid" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M18 0H0V18" fill="none" stroke="#1ec8e6" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      text { font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .title { fill:#21dff3; font-size:22px; font-weight:700; letter-spacing:.5px; }
      .chart-title { fill:#15dcf1; font-size:17px; font-weight:700; }
      .axis { fill:#86a9bc; font-size:10px; }
      .unit { fill:#22d3ee; font-size:10px; }
      .legend { fill:#9fb9c8; font-size:10px; }
      .grid { stroke:#45b9d2; stroke-opacity:.19; stroke-width:1; stroke-dasharray:4 4; }
      .axis-line { stroke:#66bfd1; stroke-opacity:.30; stroke-width:1; }
      .metric-label { fill:#a9bfd0; font-size:14px; }
      .metric-value { fill:#effbff; font-size:25px; font-weight:700; }
      .metric-sub { fill:#7f9bad; font-size:11px; }
    </style>
  </defs>

  <rect width="680" height="1010" rx="8" fill="url(#bg)"/>
  <rect width="680" height="1010" rx="8" fill="url(#microGrid)"/>
  <path d="M6 22V7H23M657 7h17v17M674 986v18h-18M24 1004H6v-18" fill="none" stroke="#27d7ef" stroke-opacity="0.80" stroke-width="1.5"/>
  <rect x="7" y="7" width="666" height="996" rx="4" fill="none" stroke="#1fc9e5" stroke-opacity="0.62"/>

  <!-- Header -->
  <path d="M20 10H659L648 63H20Z" fill="url(#header)" stroke="#1bd7ef" stroke-opacity="0.38"/>
  <path d="M28 10H62L69 20V53H28L18 42V21Z" fill="#0c5973" fill-opacity="0.72" stroke="#23d8ee" stroke-opacity="0.48"/>
  <g transform="translate(34 23)" stroke="#7aeafd" stroke-width="2" fill="none">
    <path d="M0 19V8M8 19V2M16 19V11"/>
    <path d="M-2 21H19" stroke-opacity=".65"/>
  </g>
  <text x="81" y="42" class="title">AI能源预测</text>
  <g fill="#45d7f1" filter="url(#glow)">
